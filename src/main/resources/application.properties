spring.application.name=dnd-characters-api

# Port where Spring Boot runs
server.port=8080

# Database name
spring.datasource.url=jdbc:h2:file:./data/dnd-db

# Credentials
spring.datasource.username=admin
spring.datasource.password=admin

# Enable H2 visual console in browser
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA creates tables automatically if they don't exist
spring.jpa.hibernate.ddl-auto=update

# Show SQL generated by JPA in IntelliJ console
spring.jpa.show-sql=true